backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/ct-ari-website   # ← update this
  branch: main

media_folder: public/uploads
public_folder: /uploads

# Decap CMS UI language
locale: ro

collections:
  - name: events
    label: Evenimente / События
    folder: src/content/events
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Titlu (RO), name: title_ro, widget: string }
      - { label: Título (RU), name: title_ru, widget: string }
      - { label: Data, name: date, widget: datetime }
      - { label: Locație / Место, name: location, widget: string }
      - { label: Tip / Тип, name: type, widget: select, options: [Ședință, Informare, Eveniment, Atelier] }
      - { label: Descriere (RO), name: body_ro, widget: markdown, required: false }
      - { label: Описание (RU), name: body_ru, widget: markdown, required: false }

  - name: documents
    label: Documente / Документы
    folder: src/pages/docs
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Layout, name: layout, widget: hidden, default: "../../layouts/DocLayout.astro" }
      - { label: Titlu, name: title, widget: string }
      - { label: Rezumat, name: description, widget: string, required: false }
      - { label: Data publicării, name: date, widget: date }
      - { label: Conținut, name: body, widget: markdown }
